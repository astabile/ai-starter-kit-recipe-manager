version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: recipe-manager-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: recipe-manager
    volumes:
      - mongodb_data:/data/db
    networks:
      - recipe-manager-network

volumes:
  mongodb_data:
    driver: local

networks:
  recipe-manager-network:
    driver: bridge
